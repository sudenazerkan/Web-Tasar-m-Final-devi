<section class="form-page">

<div class="form-box">

<h1>Yeni Etkinlik Ekle</h1>

<form id="eventForm">

<input
type="text"
id="title"
placeholder="Etkinlik Adı"
required
>

<input
type="text"
id="category"
placeholder="Kategori"
required
>

<input
type="date"
id="date"
required
>

<input
type="time"
id="time"
required
>

<input
type="text"
id="venue"
placeholder="Mekan"
required
>



<input
type="number"
id="price"
placeholder="Ücret"
required
>

<textarea
id="description"
placeholder="Açıklama"
required>
</textarea>

<input
type="text"
id="image"
placeholder="Görsel linki (https://...)"
required
>

<button type="submit">
Etkinlik Ekle
</button>

</form>

</div>
